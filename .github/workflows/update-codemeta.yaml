on:
  push:
    branches: [main, master]
    paths:
      - DESCRIPTION
      - .github/workflows/update-codemeta.yaml
  workflow_dispatch:

name: update-codemeta

permissions: read-all

jobs:
  update-codemeta:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    permissions:
      contents: write
      pull-requests: write

    if: "!contains(github.event.head_commit.message, 'cm-skip')"
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::codemetar, local::.

      - name: Update codemeta.json
        run: codemetar::write_codemeta()
        shell: Rscript {0}

      # main is protected (PR + signed commits required), so open a PR rather
      # than pushing directly. create-pull-request commits via the API, so the
      # commit is GitHub-signed and satisfies the ruleset.
      - name: Open codemeta PR
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: codemeta.json
          commit-message: "chore: update codemeta.json"
          branch: ci/update-codemeta
          delete-branch: true
          title: "chore: update codemeta.json"
          body: |
            Automated update of `codemeta.json` from `DESCRIPTION`.
            Generated by the `update-codemeta` workflow.
